<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            /*definir o tipo de letra padrão da página*/
        }

        table {
            width: 500px;/* Largura da colunas */
           
            border-collapse: collapse; /* Para unir as linhas entre as celulas */
        }

        tr.linha {
            background-color: rgb(215, 215, 215); /*cor da coluna tr*/
        }

        td, th {
            border: 1px solid rgb(0, 0, 0); /*borda da tabela e espaçamento*/
            padding: 10px;
        }

       td.dado {
        background-color: darkgoldenrod; /*cor da coluna td*/
       }

    </style>

</head>

<body>
    <h1>Exemplo esperado de saída (Sem CSS)</h1>

    <Table>
        <tr class="linha">
        <th>Nome do Produto</th>
        <th>Categoria</th>
        <th>Preço (R$)</th>
        <th>Estoque</th>
    </tr>
    <tr>
        <td>Camiseta</td>
        <td>Vestuário</td>
        <td>49,90</td>
        <td>20</td>
    </tr>
    <tr>
        <td>Notebook</td>
        <td>Eletrônicos</td>
        <td>3.500,00</td>
        <td>5</td>
    </tr>
    <tr>
        <td>Café Gourmet</td>
        <td>Alimentos</td>
        <td>29,90</td>
        <td>15</td>
    </tr>
    </Table>
</body>

</html>
