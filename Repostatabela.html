<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tabela</title>

    <style>
        body {
            font-family: Arial, Helvetica, sans-serif;
            /*definir o tipo de letra padrão da página*/
        }

        table {
            width: 600px;/* Largura da colunas */
           
            border-collapse: collapse; /* Para unir as linhas entre as celulas */

        }
        tr.linha {
            background-color: gray;
        }
        td, th {
            border: 1px solid black;
            padding: 8px;
        }
       
    </style>

</head>

<body>
    <h1>Exemplo esperado de saída (Sem CSS)</h1>

    <Table>
        <tr class="linha">
        <th>Nome do Produto</th>
        <th>Categoria</th>
        <th>Preço (R$)</th>
        <th>Estoque</th>
    </tr>
    <tr>
        <td>Camiseta</td>
        <td></td>
        <td></td>
        <td></td>
    </tr>
    </Table>
</body>

</html>
